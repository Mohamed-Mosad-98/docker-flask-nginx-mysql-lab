version: "3.8"

services:
  nginx:
    image: nginx:latest
    container_name: web_nginx
    ports:
      - "8080:80"
    networks:
      - app-net
    depends_on:
      - mysql_db

  mysql_db:
    image: mysql:8.0
    container_name: db_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password_secure
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password_secure
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-net
    restart: always

networks:
  app-net:
    driver: bridge

volumes:
  db_data:
    driver: local
